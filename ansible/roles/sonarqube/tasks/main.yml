---
- name: Set vm.max_map_count (Elasticsearch requirement)
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: yes

- name: Set fs.file-max
  sysctl:
    name: fs.file-max
    value: "65536"
    state: present
    reload: yes

- name: Create SonarQube data directories
  file:
    path: "{{ item }}"
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"
  loop:
    - /opt/sonarqube/data
    - /opt/sonarqube/logs
    - /opt/sonarqube/extensions

- name: Run SonarQube container
  docker_container:
    name: sonarqube
    image: sonarqube:lts-community
    state: started
    restart_policy: always
    ports:
      - "9000:9000"
    volumes:
      - /opt/sonarqube/data:/opt/sonarqube/data
      - /opt/sonarqube/logs:/opt/sonarqube/logs
      - /opt/sonarqube/extensions:/opt/sonarqube/extensions
    env:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

- name: Wait for SonarQube to be ready
  wait_for:
    port: 9000
    delay: 30
    timeout: 180

- name: Print SonarQube info
  debug:
    msg: "SonarQube URL: http://{{ ansible_host }}:9000  |  Login: admin / admin"
